env-props:
  project-dir: {{PROJ_DIR}}
  home-dir: {{HOME_DIR}}
ctx:
  jupyter: /Users/hayde/jupyter/sessions/db
spring:
  session:
    enabled: false
    schema-provided: false
  autoconfigure:
    exclude:
      [org.springframework.boot.autoconfigure.session.SessionAutoConfiguration]
  web:
    resources:
      static-locations: "file:{{PROJ_DIR}}/fe/out"
      chain:
        cache: false
      cache:
        period: 0
        cachecontrol:
          no-store: true
          must-revalidate: true
  ai.vectorstore.type: none
  dgs.graphql.enabled: false
  application:
    name: multi-agent-ide
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5105}/${POSTGRES_DATABASE:postgres}
    hikari:
      username: postgres
      password: postgres
      #jdbc-url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5105}/${POSTGRES_DATABASE:postgres}
      driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    user: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  ai:
    mcp:
      server:
        enabled: false
        type: sync
        stdio: false
        request-timeout: 90m
  docker:
    compose:
      file: file:{{PROJ_DIR}}/src/main/resources/docker/docker-compose.yml
      enabled: true
      skip:
        in-tests: false
      lifecycle-management: start_only
      start:
        skip: if_running
      readiness:
        wait: only_if_started

server.port: 8080

# CLI mode (see application-cli.yml): configure via multi-agent-ide.cli.* properties

# Logging
logging:
  level:
    root: INFO
    #    org.springframework.web: DEBUG
    com.hayden.multiagentide: INFO
    com.embabel.agent.api.channel: INFO
#    com.embabel.agent: DEBUG
#    dev.langchain4j: DEBUG
otel:
  instrumentation:
    spring-web:
      enabled: false
    spring-webmvc:
      enabled: false
    spring-webflux:
      enabled: false
    jdbc:
      enabled: false
    kafka:
      enabled: false
    mongo:
      enabled: false
  sdk:
    disabled: true
management:
  tracing:
    enabled: false
  logging:
    export:
      enabled: false
  otlp:
    metrics:
      export:
        enabled: false
    logging:
      export:
        enabled: false
embabel:
  agent:
    platform:
      direct-executions:
        max-attempts: 10
      llm-operations:
        data-binding:
          max-attempts: 1
        prompts:
          default-timeout: 900m
      scanning:
        bean: false
        annotation: false
      migration:
        scanning:
          enabled: false
  models:
    default-llm: acp-chat-model

# Artifact persistence configuration
artifacts:
  persistence:
    enabled: ${ARTIFACTS_PERSISTENCE_ENABLED:true}
    batch-size: ${ARTIFACTS_BATCH_SIZE:100}
  templates:
    load-on-startup: ${ARTIFACTS_TEMPLATES_LOAD:true}
    source-paths:
      - classpath:prompts/workflow/
multi-agent-embabel:
  chat-model:
    provider: acp
  acp:
    default-provider: claude
    providers:
      claude:
        transport: stdio
        command: ${ACP_COMMAND:claude-agent-acp}
        args: ${ACP_ARGS:}
        working-directory: ${ACP_WORKING_DIR:}
        env:
          MCP_TOOL_TIMEOUT: 900_000
          MCP_TIMEOUT: 900_000
          MCP_TOOL_CALL_MCP_REQUEST_TIMEOUT_MSEC: 900_000
      codex:
        transport: stdio
        command: ${ACP_COMMAND:codex-acp}
        args: ${ACP_ARGS:--sandbox danger-full-access --ask-for-approval never --yolo true}
        working-directory: ${ACP_WORKING_DIR:}
        auth-method: chatgpt
      claude_openrouter:
        transport: stdio
        command: ${ACP_COMMAND:claude-agent-acp}
        args: ${ACP_ARGS:--model openai/gpt-oss-120b}
        working-directory: ${ACP_WORKING_DIR:}
        default-model: openai/gpt-oss-120b
        env:
          MCP_TOOL_TIMEOUT: 900000
          MCP_TIMEOUT: 900000
          MCP_TOOL_CALL_MCP_REQUEST_TIMEOUT_MSEC: 900_000
          ANTHROPIC_BASE_URL: https://openrouter.ai/api
          ANTHROPIC_AUTH_TOKEN: ${X_OPENROUTER_API_KEY}
          ANTHROPIC_API_KEY: ""
          OPENROUTER_API_KEY: ${X_OPENROUTER_API_KEY}
          ANTHROPIC_MODEL: openai/gpt-oss-120b
          CLAUDE_CODE_EXECUTABLE: /Users/hayde/.local/bin/claude
      claude_llama:
        transport: stdio
        command: ${ACP_COMMAND:claude-agent-acp}
        args: ${ACP_ARGS:--model qwen3.5:9b}
        working-directory: ${ACP_WORKING_DIR:}
        default-model: qwen3.5:9b
        env:
          MCP_TOOL_TIMEOUT: 900000
          MCP_TIMEOUT: 900000
          MCP_TOOL_CALL_MCP_REQUEST_TIMEOUT_MSEC: 900_000
          ANTHROPIC_AUTH_TOKEN: ollama
          ANTHROPIC_BASE_URL: http://localhost:11434
          ANTHROPIC_API_KEY: ""

llm:
  model-selection:
    default-model:
      model: sonnet
      provider: claude
    by-agent-type:
      commit-agent:
        model: qwen3.5:9b
        provider: claude_llama
      merge-conflict-agent:
        model: qwen3.5:9b
        provider: claude_llama
      ai-filter:
        model: qwen3.5:9b
        provider: claude_llama
    by-template: {}

