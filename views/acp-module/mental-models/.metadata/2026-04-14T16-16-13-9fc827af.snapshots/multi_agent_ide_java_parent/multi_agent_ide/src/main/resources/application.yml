logging.level.com.hayden.multiagentide.artifacts: INFO

multi-agent-ide:
  topology:
    max-call-chain-depth: 5
    message-budget: -1
    allowed-communications:
      DISCOVERY_AGENT:
        - DISCOVERY_ORCHESTRATOR
        - DISCOVERY_COLLECTOR
      PLANNING_AGENT:
        - PLANNING_ORCHESTRATOR
        - PLANNING_COLLECTOR
      TICKET_AGENT:
        - TICKET_ORCHESTRATOR
        - TICKET_COLLECTOR
      ORCHESTRATOR:
        - DISCOVERY_ORCHESTRATOR
        - PLANNING_ORCHESTRATOR
        - TICKET_ORCHESTRATOR
        - ORCHESTRATOR_COLLECTOR
      DISCOVERY_ORCHESTRATOR:
        - ORCHESTRATOR
        - DISCOVERY_COLLECTOR
        - DISCOVERY_AGENT
      PLANNING_ORCHESTRATOR:
        - ORCHESTRATOR
        - PLANNING_COLLECTOR
        - PLANNING_AGENT
      TICKET_ORCHESTRATOR:
        - ORCHESTRATOR
        - TICKET_COLLECTOR
        - TICKET_AGENT
      DISCOVERY_COLLECTOR:
        - DISCOVERY_ORCHESTRATOR
      PLANNING_COLLECTOR:
        - PLANNING_ORCHESTRATOR
      TICKET_COLLECTOR:
        - TICKET_ORCHESTRATOR
      ORCHESTRATOR_COLLECTOR:
        - ORCHESTRATOR
      COMMIT_AGENT:
        - DISCOVERY_AGENT
        - PLANNING_AGENT
        - TICKET_AGENT
        - DISCOVERY_ORCHESTRATOR
        - PLANNING_ORCHESTRATOR
        - TICKET_ORCHESTRATOR
        - DISCOVERY_COLLECTOR
        - PLANNING_COLLECTOR
        - TICKET_COLLECTOR
        - ORCHESTRATOR
        - ORCHESTRATOR_COLLECTOR
      MERGE_CONFLICT_AGENT:
        - DISCOVERY_AGENT
        - PLANNING_AGENT
        - TICKET_AGENT
        - DISCOVERY_ORCHESTRATOR
        - PLANNING_ORCHESTRATOR
        - TICKET_ORCHESTRATOR
        - DISCOVERY_COLLECTOR
        - PLANNING_COLLECTOR
        - TICKET_COLLECTOR
        - ORCHESTRATOR
        - ORCHESTRATOR_COLLECTOR
      AI_FILTER:
        - DISCOVERY_AGENT
        - PLANNING_AGENT
        - TICKET_AGENT
        - DISCOVERY_ORCHESTRATOR
        - PLANNING_ORCHESTRATOR
        - TICKET_ORCHESTRATOR
        - DISCOVERY_COLLECTOR
        - PLANNING_COLLECTOR
        - TICKET_COLLECTOR
        - ORCHESTRATOR
        - ORCHESTRATOR_COLLECTOR
      AI_PROPAGATOR:
        - DISCOVERY_AGENT
        - PLANNING_AGENT
        - TICKET_AGENT
        - DISCOVERY_ORCHESTRATOR
        - PLANNING_ORCHESTRATOR
        - TICKET_ORCHESTRATOR
        - DISCOVERY_COLLECTOR
        - PLANNING_COLLECTOR
        - TICKET_COLLECTOR
        - ORCHESTRATOR
        - ORCHESTRATOR_COLLECTOR
      AI_TRANSFORMER:
        - DISCOVERY_AGENT
        - PLANNING_AGENT
        - TICKET_AGENT
        - DISCOVERY_ORCHESTRATOR
        - PLANNING_ORCHESTRATOR
        - TICKET_ORCHESTRATOR
        - DISCOVERY_COLLECTOR
        - PLANNING_COLLECTOR
        - TICKET_COLLECTOR
        - ORCHESTRATOR
        - ORCHESTRATOR_COLLECTOR
      REVIEW_AGENT:
        - DISCOVERY_AGENT
        - PLANNING_AGENT
        - TICKET_AGENT
        - DISCOVERY_ORCHESTRATOR
        - PLANNING_ORCHESTRATOR
        - TICKET_ORCHESTRATOR
